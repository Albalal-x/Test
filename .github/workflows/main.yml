name: SeleniumBase Anti-Bot Test

# التشغيل عند رفع الكود أو تشغيله يدوياً من تبويب Actions
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-seleniumbase:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip' # تسريع التشغيل في المرات القادمة

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase

      - name: Install Chrome and Driver
        run: |
          # تثبيت المتصفح الرسمي لضمان التوافق مع وضع UC
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # تثبيت تعريف المتصفح المتوافق
          seleniumbase install chromedriver

      - name: Check Files
        run: ls -R # للتأكد من أن ملف test_bot.py موجود في المسار الصحيح

      - name: Run Test in CDP Mode
        run: |
          # --uc: تفعيل وضع Undetected Chromedriver لتجاوز الحماية
          # --headless: التشغيل بدون واجهة رسومية (إلزامي في GitHub)
          # -s: لإظهار مخرجات الـ print في الـ Console
          # -v: لإظهار تفاصيل إضافية عن الاختبار
          pytest test_bot.py --uc --headless -s -v

      - name: Upload Result Screenshot
        if: always() # سيتم رفع الصورة حتى لو فشل الاختبار أو نجح
        uses: actions/upload-artifact@v4
        with:
          name: manga-site-evidence
          path: |
            manga_result.png
            error_screenshot.png
          if-no-files-found: warn
